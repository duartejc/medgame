name = "plantao-medgame"
main = "dist/index.js"
compatibility_date = "2024-12-16"

# KV namespace binding (crie via Dashboard depois de vincular o projeto)
# Descomente após configurar o namespace no Cloudflare Dashboard
# [[kv_namespaces]]
# binding = "LEADS_KV"
# id = "seu-kv-namespace-id-aqui"
# preview_id = "seu-kv-preview-id-aqui"

# Variáveis de ambiente (adicione via Dashboard: Settings > Environment variables)
[env.production]
vars = { DEEPSEEK_MODEL = "deepseek-chat" }

# Secrets (adicione via Dashboard: Settings > Environment variables > Secrets)
# DEEPSEEK_API_KEY será uma secret
